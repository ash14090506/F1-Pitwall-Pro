# CodeRabbit Configuration
# https://docs.coderabbit.ai/guides/configure-coderabbit

language: en-US

tone_instructions: >
  Be direct and technical. Focus on performance issues, security concerns,
  and F1 domain-specific data handling (FastF1, telemetry arrays, Pandas operations).
  Flag any unhandled NaN/Inf in numerical computations.

early_access: true

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  auto_title_placeholder: "@coderabbitai"
  review_status: true
  collapse_walkthrough: false
  sequence_diagrams: true
  
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - dev
  
  path_instructions:
    - path: "backend/**"
      instructions: >
        Review for FastAPI best practices, proper error handling with HTTPException,
        NaN/Inf sanitization before JSON serialization, efficient Pandas operations,
        and correct FastF1 API usage. Check that all endpoints follow the existing
        pattern of using get_parsed_session() for session caching.
    - path: "frontend/src/components/**"
      instructions: >
        Review for React best practices, proper useEffect cleanup, memo usage for
        expensive Plotly renders, consistent dark theme styling (#0b0d10 bg, #2b2e36 borders),
        and proper error/loading state handling with axios calls.
    - path: "frontend/src/App.jsx"
      instructions: >
        Verify new components are properly imported, added to renderModalContent() switch,
        and connected to Sidebar navigation. Check prop drilling consistency.
  
  path_filters:
    - "!**/__pycache__/**"
    - "!**/node_modules/**"
    - "!**/data/cache/**"
    - "!**/.git/**"
    - "!**/venv/**"
    - "!**/*.pyc"
    - "!**/package-lock.json"
  
  tools:
    eslint:
      enabled: true
    ruff:
      enabled: true
    biome:
      enabled: false
    markdownlint:
      enabled: true

chat:
  auto_reply: true
